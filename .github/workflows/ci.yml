name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gradle runs under JDK 21 (the loom plugin rejects newer JDKs); the mod
      # itself compiles on the JDK 8 toolchain. setup-java leaves JAVA_HOME on the
      # last version listed (21) and exports JAVA_HOME_8_X64 for the toolchain.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            21

      - name: build
        run: |
          VERSION_ARG=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION_ARG="-Pversion=${GITHUB_REF#refs/tags/v}"
          fi
          ./gradlew build --no-daemon --stacktrace $VERSION_ARG \
            -Porg.gradle.java.installations.paths="$JAVA_HOME_8_X64,$JAVA_HOME_21_X64"

      - uses: actions/upload-artifact@v4
        with:
          name: villoverlay-jar
          path: build/libs/villoverlay-*.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: villoverlay-jar

      - uses: softprops/action-gh-release@v2
        with:
          files: '**/villoverlay-*.jar'
          fail_on_unmatched_files: true
          generate_release_notes: true
